{% for player in players %}
    {% if player.player.is_authenticated %}
        <div class="answered_player-avatar"><img src="{{ player.player.profile.avatar.url }}" class="player-avatar-img"></div>
    {% else %}
        <div class="answered_player-avatar"><img src="{{ player.avatar.image.url }}" class="player-avatar-img"></div>
    {% endif %}
{% endfor %}
